# ===============================
# GLOBAL / SYSTEM ERRORS
# ===============================
error.validation=Validation error in the provided data.
error.internal.server=An internal server error occurred.
error.json.invalid=Missing request body or invalid JSON format.
error.data.integrity=Data integrity conflict. A database rule was violated.

