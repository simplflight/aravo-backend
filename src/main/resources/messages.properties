# ===============================
# GLOBAL / SYSTEM ERRORS
# ===============================
error.validation=Erro de validaçăo nos dados enviados.
error.internal.server=Ocorreu um erro interno no servidor.
error.json.invalid=Corpo da requisiçăo ausente ou formato JSON inválido.
error.data.integrity=Conflito de integridade nos dados. Uma regra do banco de dados foi violada.

# ===============================
# DOMÍNIO: USER (USUÁRIO)
# ===============================
# Validaçőes
user.identifier.required=O email ou nickname é obrigatório.
user.email.required=O email é obrigatório.
user.email.invalid=O formato do email é inválido.
user.nickname.size=O nickname deve ter entre 3 e 20 caracteres.
user.nickname.pattern=O nickname năo pode conter espaços ou caracteres especiais.
user.password.required=A senha é obrigatória.
user.password.size=A senha deve possuir, pelo menos, 6 caracteres.
# Negócio
error.email.in.use=Este email já está em uso.
error.nickname.in.use=Este nickname já está em uso.
error.user.not.found=Usuário năo encontrado.
error.invalid.credentials=Credenciais inválidas.

# ===============================
# DOMÍNIO: ITEM / STORE (LOJA)
# ===============================
# Validaçőes
item.id.required=O ID do item é obrigatório.
item.quantity.required=A quantidade é obrigatória.
item.quantity.min=A quantidade mínima para compra é 1.
# Negócio
error.item.not.found=Item năo encontrado na loja.
error.insufficient.points=Saldo de pontos insuficiente para realizar esta compra.
error.item.max.quantity=Năo é possível comprar esta quantidade. O limite para este item foi atingido.

# ===============================
# DOMÍNIO: ACTIVITY (ATIVIDADES)
# ===============================
# Validaçőes
activity.title.required=O título da atividade é obrigatório.
activity.category.required=A categoria da atividade é obrigatória.
activity.focustime.required=O tempo de foco é obrigatório.
activity.focustime.min=O tempo de foco deve ser de no mínimo 2 minutos.
# Negócio
error.activity.in.progress=Vocę já possui uma atividade em andamento.
error.activity.not.found=Atividade năo encontrada.
error.activity.not.in.progress=Esta atividade năo pode ser concluída.