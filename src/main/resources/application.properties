spring.application.name=aravo

# Config. Banco de Dados
spring.datasource.url=jdbc:postgresql://localhost:5432/aravo_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Config. JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Config. Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Config. JWT
api.security.token.secret=chave_secreta_temporaria_e_bem_longa
api.security.token.expiration=86400000
