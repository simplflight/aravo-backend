services:
  # Banco de Dados PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: aravo_db
    environment:
      POSTGRES_DB: aravo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Aplicação
  api:
    build: .
    container_name: aravo_api
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_URL=jdbc:postgresql://db:5432/aravo_db
      - DB_USER=postgres
      - DB_PASSWORD=admin
    restart: unless-stopped

volumes:
  postgres_data: